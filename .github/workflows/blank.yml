name: Waka Readme

on:
  workflow_dispatch: # Supaya bisa dijalankan manual
  schedule:
    - cron: '0 0 * * *' # Berjalan setiap jam 12 malam

jobs:
  update-readme:
    name: Update WakaTime Stats
    runs-on: ubuntu-latest
    # TAMBAHKAN BAGIAN INI:
    permissions:
      contents: write
    
    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Argumen opsional lainnya:
          SHOW_TITLE: true
          SECTION_NAME: wakatime
          BLOCKS: ⣿
          TIME_RANGE: all_time
          LANG_COUNT: 10
